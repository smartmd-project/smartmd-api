services:
  postgres:
    image: postgres:15 
    container_name: smartmd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}   
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smartmd}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: